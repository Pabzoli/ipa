name: quiz
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  connectivity_plus: ^7.1.1   # offline detection
  google_mobile_ads: ^5.1.0   # AdMob — rewarded + interstitial
  cloud_functions: ^6.2.0     # Call Cloud Functions (prize pool increment)
  cupertino_icons: ^1.0.2
  screenshot: ^3.0.0     # off-screen widget → Uint8List image
  share_plus: ^10.0.1        # native share sheet
  path_provider: ^2.1.3     # getTemporaryDirectory() for the temp file

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/attack on titan.png
    - assets/demon slayer.png
    - assets/jujutsu kaisen.png
    - assets/naruto.png
    - assets/one piece.png
    - assets/one punch man.png

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900